<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
</style>
    <link rel="stylesheet" href="style.css">
    <script src="code.js" defer></script>
</head>
<body>
    <div id="sidebar">
        <div id="logo">
            <img src="" alt="">
            <div id="logoText"></div>
        </div>
        <div id="links1">
            <div class="sidebarLink">
                <img src="" alt="" id="linkImg1">
                <div class="linkText">Home</div>
            </div>
            <div class="sidebarLink">
                <img src="" alt="" id="linkImg2">
                <div class="linkText">Profile</div>
            </div>
            <div class="sidebarLink">
                <img src="" alt="" id="linkImg3">
                <div class="linkText">Messages</div>
            </div>
            <div class="sidebarLink">
                <img src="" alt="" id="linkImg4">
                <div class="linkText">History</div>
            </div>
            <div class="sidebarLink">
                <img src="" alt="" id="linkImg5">
                <div class="linkText">Tasks</div>
            </div>
            <div class="sidebarLink">
                <img src="" alt="" id="linkImg6">
                <div class="linkText">Communities</div>
            </div>
        </div>
        <div id="links2">
            <div class="sidebarLink">
                <img src="" alt="" id="linkImg7">
                <div class="linkText">Settings</div>
            </div>
            <div class="sidebarLink">
                <img src="" alt="" id="linkImg8">
                <div class="linkText">Support</div>
            </div>
            <div class="sidebarLink">
                <img src="" alt="" id="linkImg9">
                <div class="linkText">Privacy</div>
            </div>
        </div>
    </div>
    <div id="header">
        <div id="headerTop">
            <div id="searchBar">search</div>
            <div id="headerTopRight">
                <div id="notifications">notif</div>
                <div id="accountSettings">pic</div>
                <div id="userName">username</div>
            </div>
        </div>
        <div id="headerBottom">
            <div id="headerBottomLeft">
                <div id="displayPicture">
                    <svg width="60px" height="60px">
                        <circle cx="30px" cy="30px" r="30px" stroke="black" fill="yellow" stroke-width="2px">
                        </circle>
                    </svg>
                </div>
                <div id="greeting">
                    <div id="greeting1">Hi there,</div>
                    <div id="greeting2">Morgan Oakley (@morgan)</div>
                </div>
            </div>
            <div id="headerButtons">buttons!</div>
        </div>
    </div>
    <div id="mainBody">
        <div id="projects">
            <div id="projectHeading">Your Projects</div>
            <div id="projectCards">
                <div id="card1" class="card">
                    <div class="cardText"></div>
                </div>
                <div id="card2" class="card">
                    <div class="cardText"></div>
                </div>
                <div id="card3" class="card">
                    <div class="cardText"></div>
                </div>
                <div id="card4" class="card">
                    <div class="cardText"></div>
                </div>
                <div id="card5" class="card">
                    <div class="cardText"></div>
                </div>
                <div id="card6" class="card">
                    <div class="cardText"></div>
                </div>
            </div>
        </div>
        <div id="announcements">Announcements</div>
        <div id="trending">Trending</div>
    </div>
</body>
</html>
